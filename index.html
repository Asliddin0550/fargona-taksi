<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Farg'ona - Shohimard on Taksi</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body { font-family: 'Segoe UI', system-ui, sans-serif; }
    .hero { background: linear-gradient(135deg, #ef4444, #f97316); }
    .field-blue { background: linear-gradient(135deg, #dbeafe, #bfdbfe); border: 2px solid #3b82f6; }
    .field-green { background: linear-gradient(135deg, #d1fae5, #a7f3d0); border: 2px solid #10b981; }
    .field-yellow { background: linear-gradient(135deg, #fef3c7, #fde68a); border: 2px solid #f59e0b; }
    .field-pink { background: linear-gradient(135deg, #fce7f3, #fbcfe8); border: 2px solid #ec4899; }
    .field-purple { background: linear-gradient(135deg, #e9d5ff, #d8b4fe); border: 2px solid #a855f7; }
    .field-orange { background: linear-gradient(135deg, #fed7aa, #fdba74); border: 2px solid #f97316; }
    .field-red { background: linear-gradient(135deg, #fecaca, #fca5a5); border: 2px solid #ef4444; }
  </style>
</head>
<body class="bg-gradient-to-b from-purple-700 to-purple-900 min-h-screen pb-12">

  <!-- Header -->
  <div class="hero text-white py-8 text-center">
    <div class="max-w-md mx-auto px-4">
      <div class="flex justify-center mb-3">
        <i class="fa-solid fa-car-side text-5xl"></i>
      </div>
      <h1 class="text-3xl font-bold">Farg'ona - Shohimard on Taksi</h1>
      <p class="mt-2 text-sm opacity-90">Farg'ona viloyati barcha tumanlari va shaharlarida tez va ishonchli taksi xizmati</p>
      <p class="mt-4 text-lg font-medium">📞 +998 33 835 11 87</p>
    </div>
  </div>

  <div class="max-w-md mx-auto mt-8 px-4">
    <div class="bg-white rounded-3xl shadow-2xl overflow-hidden">
      <form id="taxiForm" class="p-6 space-y-6">
        
        <!-- QAYERDAN - Blue -->
        <div>
          <label class="block text-xs font-bold text-blue-700 mb-1.5">📍 QAYERDAN</label>
          <select id="from" required class="field-blue w-full rounded-2xl px-5 py-4 text-gray-800 font-semibold">
            <option value="">Tanlang</option>
            <option value="Shohimard on">Shohimard on</option>
            <option value="Farg'ona shahri">Farg'ona shahri</option>
            <option value="Marg'ilon">Marg'ilon</option>
            <option value="Qo'qon">Qo'qon</option>
            <option value="Rishton">Rishton</option>
            <option value="Quva">Quva</option>
            <option value="Toshloq">Toshloq</option>
          </select>
        </div>

        <!-- QAYERGA - Green -->
        <div>
          <label class="block text-xs font-bold text-green-700 mb-1.5">🎯 QAYERGA</label>
          <select id="to" required class="field-green w-full rounded-2xl px-5 py-4 text-gray-800 font-semibold">
            <option value="">Tanlang</option>
            <option value="Shohimard on">Shohimard on</option>
            <option value="Farg'ona shahri">Farg'ona shahri</option>
            <option value="Marg'ilon">Marg'ilon</option>
            <option value="Qo'qon">Qo'qon</option>
            <option value="Toshkent">Toshkent</option>
            <option value="Toshloq">Toshloq</option>
          </select>
        </div>

        <!-- NECHA KISHI - Yellow -->
        <div>
          <label class="block text-xs font-bold text-yellow-700 mb-1.5">👥 NECHA KISHI?</label>
          <input type="number" id="people" placeholder="Sonini yozing" required 
            class="field-yellow w-full rounded-2xl px-5 py-4 text-gray-800 font-semibold">
        </div>

        <!-- KETISH SANASI - Pink -->
        <div>
          <label class="block text-xs font-bold text-pink-700 mb-1.5">📅 KETISH SANASI</label>
          <input type="date" id="date" required 
            class="field-pink w-full rounded-2xl px-5 py-4 text-gray-800 font-semibold">
        </div>

        <!-- KETISH VAQTI - Purple -->
        <div>
          <label class="block text-xs font-bold text-purple-700 mb-1.5">⏰ KETISH VAQTI</label>
          <input type="time" id="time" required 
            class="field-purple w-full rounded-2xl px-5 py-4 text-gray-800 font-semibold">
        </div>

        <!-- MASHINA TURI - Orange -->
        <div>
          <label class="block text-xs font-bold text-orange-700 mb-1.5">🚗 MASHINA TURI</label>
          <select id="car" required class="field-orange w-full rounded-2xl px-5 py-4 text-gray-800 font-semibold">
            <option value="">Tanlang</option>
            <option value="Yengil avtomobil">Yengil avtomobil</option>
            <option value="Damas">Damas</option>
            <option value="Lacetti">Lacetti</option>
            <option value="JAK 10-15 kishili">JAK 10-15 kishili</option>
          </select>
        </div>

        <!-- TELEFON RAQAM - Red -->
        <div>
          <label class="block text-xs font-bold text-red-700 mb-1.5">📞 TELEFON RAQAM</label>
          <input type="tel" id="phone" placeholder="+998 XX XXX XX XX" required 
            class="field-red w-full rounded-2xl px-5 py-4 text-gray-800 font-semibold">
        </div>

        <button type="submit" 
          class="w-full bg-gradient-to-r from-red-500 to-orange-500 hover:from-red-600 hover:to-orange-600 text-white font-bold py-5 rounded-2xl text-lg flex items-center justify-center gap-2 shadow-lg transform transition hover:scale-105">
          <i class="fa-solid fa-paper-plane"></i> BUYURTMA YUBORISH
        </button>
      </form>
    </div>
  </div>

  <script>
    const BOT_TOKEN = "8202225710:AAFeDmr0Jp1-WOvo234hFZeQtk_-qkMytzs";
    const GROUP_ID = "-1002503400045";

    // Sanani formatlash funksiyasi (YYYY-MM-DD -> DD/MM/YYYY)
    function formatDate(dateString) {
      const parts = dateString.split('-');
      return `${parts[2]}/${parts[1]}/${parts[0]}`;
    }

    // Vaqtni formatlash funksiyasi (o'zgartirmasdan qaytaradi)
    function formatTime(timeString) {
      return timeString;
    }

    document.getElementById("taxiForm").addEventListener("submit", async function(e) {
      e.preventDefault();

      const data = {
        from: document.getElementById("from").value,
        to: document.getElementById("to").value,
        people: document.getElementById("people").value,
        date: formatDate(document.getElementById("date").value),
        time: formatTime(document.getElementById("time").value),
        car: document.getElementById("car").value,
        phone: document.getElementById("phone").value
      };

      // Rangli formatda Telegram xabari
      const message = `
🚖 <b>YANGI BUYURTMA!</b> 🚖

 <b>QAYERDAN:</b> <code>${data.from}</code>
🎯 <b>QAYERGA:</b> <code>${data.to}</code>
👥 <b>KISHI SONI:</b> <b>${data.people}</b> nafar
📅 <b>SANA:</b> <b>${data.date}</b>
⏰ <b>VAQT:</b> <b>${data.time}</b>
🚗 <b>MASHINA:</b> <code>${data.car}</code>
📞 <b>TELEFON:</b> <a href="tel:${data.phone}">${data.phone}</a>

━━━━━━━━━━━━━━━━━
💰 <i>To'lov: Naqd/Karta</i>
✅ <i>Buyurtma qabul qilindi!</i>
      `;

      try {
        const btn = e.target.querySelector("button[type='submit']");
        const originalText = btn.innerHTML;
        btn.disabled = true;
        btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Yuborilmoqda...';

        const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            chat_id: GROUP_ID,
            text: message,
            parse_mode: "HTML"
          })
        });

        const result = await response.json();

        if (response.ok) {
          alert("✅ Buyurtma muvaffaqiyatli yuborildi!\nTez orada aloqaga chiqamiz.");
          document.getElementById("taxiForm").reset();
        } else {
          alert("❌ Xatolik: " + (result.description || "Noma'lum xatolik"));
        }
        
        btn.disabled = false;
        btn.innerHTML = originalText;
      } catch (error) {
        alert("❌ Internet xatoligi: " + error.message);
        console.error(error);
      }
    });
  </script>
</body>
</html>
