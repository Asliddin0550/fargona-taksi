<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Farg'ona - Shohimard on Taksi</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body { font-family: 'Segoe UI', system-ui, sans-serif; }
    .hero { background: linear-gradient(135deg, #ef4444, #f97316); }
    select:focus, input:focus { border-color: #ef4444; box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.2); }
  </style>
</head>
<body class="bg-gradient-to-b from-purple-700 to-purple-900 min-h-screen pb-12">

  <!-- Header -->
  <div class="hero text-white py-8 text-center">
    <div class="max-w-md mx-auto px-4">
      <div class="flex justify-center mb-3">
        <i class="fa-solid fa-car-side text-5xl"></i>
      </div>
      <h1 class="text-3xl font-bold">Farg'ona - Shohimard on Taksi</h1>
      <p class="mt-2 text-sm opacity-90">
        Farg‘ona viloyati barcha tumanlari va shaharlarida tez va ishonchli taksi xizmati
      </p>
      <p class="mt-4 text-lg font-medium flex items-center justify-center gap-2">
        <i class="fa-brands fa-whatsapp"></i>
        <a href="tel:+998338351187" class="hover:underline">+998 33 835 11 87</a>
      </p>
    </div>
  </div>

  <!-- Form -->
  <div class="max-w-md mx-auto mt-8 px-4">
    <div class="bg-white rounded-3xl shadow-2xl overflow-hidden">
      <form id="taxiForm" class="p-6 space-y-6">
        
        <!-- Qayerdan -->
        <div>
          <label class="block text-xs font-semibold text-gray-600 mb-1.5">QAYERDAN</label>
          <select id="from" required
            class="w-full border border-gray-300 rounded-2xl px-5 py-4 text-gray-700 focus:outline-none">
            <option value="">Tanlang</option>
            <option value="Shohimard on">Shohimard on</option>
            <option value="Farg'ona shahri">Farg'ona shahri</option>
            <option value="Marg'ilon">Marg'ilon</option>
            <option value="Qo'qon">Qo'qon</option>
            <option value="Rishton">Rishton</option>
            <option value="Quva">Quva</option>
            <option value="Boshqa">Boshqa (yozing)</option>
          </select>
        </div>

        <!-- Qayerga -->
        <div>
          <label class="block text-xs font-semibold text-gray-600 mb-1.5">QAYERGA</label>
          <select id="to" required
            class="w-full border border-gray-300 rounded-2xl px-5 py-4 text-gray-700 focus:outline-none">
            <option value="">Tanlang</option>
            <option value="Shohimard on">Shohimard on</option>
            <option value="Farg'ona shahri">Farg'ona shahri</option>
            <option value="Marg'ilon">Marg'ilon</option>
            <option value="Qo'qon">Qo'qon</option>
            <option value="Toshkent">Toshkent</option>
            <option value="Boshqa">Boshqa (yozing)</option>
          </select>
        </div>

        <!-- Necha kishi -->
        <div>
          <label class="block text-xs font-semibold text-gray-600 mb-1.5">NECHA KISHI?</label>
          <input type="number" id="people" placeholder="Sonini yozing (masalan: 3)" required
            class="w-full border border-gray-300 rounded-2xl px-5 py-4 focus:outline-none">
        </div>

        <!-- Sana -->
        <div>
          <label class="block text-xs font-semibold text-gray-600 mb-1.5">KETISH SANASI</label>
          <input type="date" id="date" value="2026-04-13" required
            class="w-full border border-gray-300 rounded-2xl px-5 py-4 focus:outline-none">
        </div>

        <!-- Vaqt -->
        <div>
          <label class="block text-xs font-semibold text-gray-600 mb-1.5">KETISH VAQTI</label>
          <input type="time" id="time" required
            class="w-full border border-gray-300 rounded-2xl px-5 py-4 focus:outline-none">
        </div>

        <!-- Mashina turi -->
        <div>
          <label class="block text-xs font-semibold text-gray-600 mb-1.5">MASHINA TUR I</label>
          <select id="car" required
            class="w-full border border-red-500 rounded-2xl px-5 py-4 text-gray-700 focus:outline-none">
            <option value="">Tanlang</option>
            <option value="Yengil avtomobil">Yengil avtomobil</option>
            <option value="JAK 10-15 kishili">JAK 10-15 kishili</option>
            <option value="Damas">Damas</option>
            <option value="Lacetti">Lacetti</option>
            <option value="Nexia">Nexia</option>
            <option value="Katta avtobus">Katta avtobus</option>
          </select>
        </div>

        <!-- Telefon -->
        <div>
          <label class="block text-xs font-semibold text-gray-600 mb-1.5">TELEFON RAQAM</label>
          <input type="tel" id="phone" placeholder="+998 XX XXX XX XX" required
            class="w-full border border-gray-300 rounded-2xl px-5 py-4 focus:outline-none">
        </div>

        <!-- Submit Button -->
        <button type="submit"
          class="w-full bg-red-500 hover:bg-red-600 transition-all text-white font-bold text-lg py-5 rounded-2xl flex items-center justify-center gap-3 shadow-lg">
          <span class="text-2xl">🚕</span>
          BUYURTMA YUBORISH
        </button>
      </form>
    </div>
  </div>

  <script>
    const BOT_TOKEN = "8202225710:AAFeDmr0Jp1-WOvo234hFZeQtk_-qkMytzs";
    const GROUP_ID = "-1002503400045";

    document.getElementById("taxiForm").addEventListener("submit", async function(e) {
      e.preventDefault();

      const from = document.getElementById("from").value;
      const to = document.getElementById("to").value;
      const people = document.getElementById("people").value;
      const date = document.getElementById("date").value;
      const time = document.getElementById("time").value;
      const car = document.getElementById("car").value;
      const phone = document.getElementById("phone").value;

      const message = `
🚕 <b>Yangi Buyurtma!</b>

📍 Qayerdan: ${from}
📍 Qayerga: ${to}
👥 Necha kishi: ${people} ta
📅 Sana: ${date}
⏰ Vaqt: ${time}
🚗 Mashina turi: ${car}
📞 Telefon: ${phone}
      `;

      const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
      
      try {
        const res = await fetch(url, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            chat_id: GROUP_ID,
            text: message,
            parse_mode: "HTML"
          })
        });

        if (res.ok) {
          alert("✅ Buyurtmangiz muvaffaqiyatli yuborildi!\nTez orada siz bilan bog'lanamiz.");
          document.getElementById("taxiForm").reset();
        } else {
          alert("Xatolik yuz berdi. Iltimos qayta urinib ko'ring.");
        }
      } catch (err) {
        alert("Internet aloqasi muammosi. Keyinroq urinib ko'ring.");
      }
    });
  </script>
</body>
</html>
